<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>레전드 명언록</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">
                <h1>🎓 레전드 명언록</h1>
            </div>
            <div class="nav-links">
                <a href="/posts">게시판</a>
                <a href="/login">로그인</a>
                <a href="/signup">회원가입</a>
            </div>
        </nav>
    </header>

    <main>
        <section class="hero">
            <h2>교수님의 레전드 명언을 기록하세요</h2>
            <p>수업 중 들었던 인상 깊은 교수님의 말씀을 공유해보세요</p>
            <a href="/posts/create" class="btn-primary">명언 등록하기</a>
        </section>

        <section class="popular-posts">
            <h3>🔥 인기 명언</h3>
            <div class="post-grid" id="popularPosts">
                <!-- 인기 게시글이 여기에 로드됩니다 -->
            </div>
        </section>
    </main>

    <script>
        // 인기 게시글 로드
        fetch('/api/posts')
            .then(response => response.json())
            .then(posts => {
                const container = document.getElementById('popularPosts');
                posts.slice(0, 6).forEach(post => {
                    const postCard = document.createElement('div');
                    postCard.className = 'post-card';
                    postCard.innerHTML = `
                        <h4>${post.title}</h4>
                        <p>${post.content.substring(0, 100)}...</p>
                        <span class="professor">- ${post.professor}</span>
                    `;
                    container.appendChild(postCard);
                });
            });
    </script>
</body>
</html>
