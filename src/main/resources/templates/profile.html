<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로필 수정 - 레전드 명언록</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">
                <a href="/"><h1>🎓 레전드 명언록</h1></a>
            </div>
            <div class="nav-links">
                <a href="/posts">게시판</a>
                <a href="/posts/create" class="btn-primary">글쓰기</a>
                <a href="/profile">프로필</a>
            </div>
        </nav>
    </header>

    <main class="create-main">
        <div class="create-container">
            <h2>프로필 수정</h2>
            
            <form id="profileForm">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" required>
                </div>

                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="email" disabled>
                </div>

                <div class="form-group">
                    <label for="password">새 비밀번호 (변경하지 않으려면 비워두세요)</label>
                    <input type="password" id="password" name="password">
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="history.back()">취소</button>
                    <button type="submit" class="btn-primary">수정하기</button>
                </div>
            </form>
            
            <div style="text-align: center; margin-top: 2rem;">
                <a href="#" onclick="deleteAccount()" style="font-size: 0.8rem; color: #999; text-decoration: underline;">회원 탈퇴</a>
            </div>
        </div>
    </main>

    <script>
        // 현재 사용자 정보 로드
        async function loadUserInfo() {
            // 쿠키에서 로그인 상태 확인
            const isLoggedIn = getCookie('isLoggedIn');
            if (isLoggedIn !== 'true') {
                alert('로그인이 필요합니다.');
                window.location.href = '/login';
                return;
            }

            try {
                const response = await fetch('/api/users/profile');
                if (response.ok) {
                    const user = await response.json();
                    document.getElementById('name').value = user.name;
                    document.getElementById('email').value = user.email;
                } else {
                    alert('사용자 정보를 불러올 수 없습니다.');
                }
            } catch (error) {
                console.error('사용자 정보 로드 실패:', error);
            }
        }

        // 쿠키 값 가져오기
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }

        // 프로필 수정 폼 제출
        document.getElementById('profileForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = {
                name: document.getElementById('name').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch('/api/users/profile', {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                const result = await response.json();

                if (response.ok) {
                    alert(result.message);
                    window.location.href = '/';
                } else if (response.status === 401) {
                    alert('로그인이 필요합니다.');
                    window.location.href = '/login';
                } else {
                    alert(result.message || '프로필 수정에 실패했습니다.');
                }
            } catch (error) {
                console.error('프로필 수정 실패:', error);
                alert('프로필 수정에 실패했습니다.');
            }
        });

        // 회원 탈퇴
        async function deleteAccount() {
            if (!confirm('정말로 탈퇴하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) {
                return;
            }

            try {
                const response = await fetch('/api/users/profile', {
                    method: 'DELETE'
                });

                if (response.ok) {
                    alert('회원 탈퇴가 완료되었습니다.');
                    window.location.href = '/';
                } else {
                    alert('탈퇴 처리 중 오류가 발생했습니다.');
                }
            } catch (error) {
                console.error('탈퇴 실패:', error);
                alert('탈퇴 처리 중 오류가 발생했습니다.');
            }
        }

        // 페이지 로드 시 사용자 정보 로드
        document.addEventListener('DOMContentLoaded', loadUserInfo);
    </script>
</body>
</html>
