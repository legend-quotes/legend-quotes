<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>글쓰기 - 레전드 명언록</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">
                <a href="/"><h1>🎓 레전드 명언록</h1></a>
            </div>
            <div class="nav-links">
                <a href="/posts">게시판</a>
            </div>
        </nav>
    </header>

    <main class="create-main">
        <div class="create-container">
            <h2>새로운 명언 등록</h2>
            <form id="createPostForm">
                <div class="form-group">
                    <label for="title">제목</label>
                    <input type="text" id="title" name="title" placeholder="명언의 제목을 입력하세요" required>
                </div>
                
                <div class="form-group">
                    <label for="professor">교수님 성함</label>
                    <input type="text" id="professor" name="professor" placeholder="교수님 성함을 입력하세요" required>
                </div>
                
                <div class="form-group">
                    <label for="content">명언 내용</label>
                    <textarea id="content" name="content" rows="6" placeholder="교수님이 하신 말씀을 입력하세요" required></textarea>
                </div>
                
                <div class="form-actions">
                    <button type="button" onclick="history.back()" class="btn-secondary">취소</button>
                    <button type="submit" class="btn-primary">등록하기</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('createPostForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const formData = {
                title: document.getElementById('title').value,
                content: document.getElementById('content').value,
                professor: document.getElementById('professor').value
            };

            try {
                const response = await fetch('/api/posts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    alert('게시글이 등록되었습니다!');
                    window.location.href = '/posts';
                } else if (response.status === 401) {
                    alert('로그인이 필요합니다.');
                    window.location.href = '/login';
                } else {
                    alert('게시글 등록에 실패했습니다.');
                }
            } catch (error) {
                alert('게시글 등록 중 오류가 발생했습니다.');
            }
        });
    </script>
</body>
</html>
