<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시판 - 레전드 명언록</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">
                <a href="/"><h1>🎓 레전드 명언록</h1></a>
            </div>
            <div class="nav-links" id="navLinks">
                <a href="/posts">게시판</a>
                <a href="/posts/create" class="btn-primary">글쓰기</a>
                <div id="authLinks">
                    <a href="/login">로그인</a>
                    <a href="/signup">회원가입</a>
                </div>
                <div id="userLinks" style="display: none;">
                    <a href="/profile">프로필</a>
                    <button onclick="logout()" class="btn-secondary">로그아웃</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="posts-main">
        <div class="posts-header">
            <h2>교수님 명언 모음</h2>
            <div class="filter-controls">
                <select id="sortSelect">
                    <option value="latest">최신순</option>
                    <option value="popular">인기순</option>
                </select>
            </div>
        </div>

        <div class="posts-container" id="postsContainer">
            <!-- 게시글 목록이 여기에 로드됩니다 -->
        </div>
    </main>

    <script>
        let posts = [];

        async function loadPosts() {
            try {
                const response = await fetch('/api/posts');
                posts = await response.json();
                renderPosts(posts);
            } catch (error) {
                console.error('게시글 로드 실패:', error);
            }
        }

        function renderPosts(postsToRender) {
            const container = document.getElementById('postsContainer');
            container.innerHTML = '';

            postsToRender.forEach(post => {
                const postElement = document.createElement('div');
                postElement.className = 'post-item';
                postElement.innerHTML = `
                    <div class="post-content">
                        <h3><a href="/posts/${post.id}" style="text-decoration: none; color: inherit;">${post.title}</a></h3>
                        <p>${post.content}</p>
                        <div class="post-meta">
                            <span class="professor">👨‍🏫 ${post.professor}</span>
                            <span class="date">${new Date(post.createdAt).toLocaleDateString()}</span>
                        </div>
                    </div>
                `;
                postElement.style.cursor = 'pointer';
                postElement.addEventListener('click', () => {
                    window.location.href = `/posts/${post.id}`;
                });
                container.appendChild(postElement);
            });
        }

        document.getElementById('sortSelect').addEventListener('change', (e) => {
            const sortType = e.target.value;
            let sortedPosts = [...posts];

            if (sortType === 'latest') {
                sortedPosts.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            } else if (sortType === 'popular') {
                // 추후 좋아요 기능 구현 시 정렬 로직 추가
                sortedPosts.sort((a, b) => b.id - a.id);
            }

            renderPosts(sortedPosts);
        });

        // 쿠키 값 가져오기
        function getCookie(name) {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return parts.pop().split(';').shift();
        }

        // 로그아웃
        function logout() {
            document.cookie = 'isLoggedIn=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
            document.cookie = 'userId=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
            document.cookie = 'userIdJs=; expires=Thu, 01 Jan 1970 00:00:00 UTC; path=/;';
            window.location.href = '/login';
        }

        // 네비게이션 상태 업데이트
        function updateNavigation() {
            const isLoggedIn = getCookie('isLoggedIn');
            const authLinks = document.getElementById('authLinks');
            const userLinks = document.getElementById('userLinks');
            
            if (isLoggedIn === 'true') {
                authLinks.style.display = 'none';
                userLinks.style.display = 'flex';
            } else {
                authLinks.style.display = 'flex';
                userLinks.style.display = 'none';
            }
        }

        // 페이지 로드 시 실행
        document.addEventListener('DOMContentLoaded', function() {
            updateNavigation();
            loadPosts();
        });
    </script>
</body>
</html>
