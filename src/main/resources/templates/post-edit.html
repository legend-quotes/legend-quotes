<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>게시글 수정 - 레전드 명언록</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header>
        <nav class="navbar">
            <div class="nav-brand">
                <a href="/"><h1>🎓 레전드 명언록</h1></a>
            </div>
            <div class="nav-links">
                <a href="/posts">게시판</a>
                <a href="/posts/create" class="btn-primary">글쓰기</a>
            </div>
        </nav>
    </header>

    <main class="create-main">
        <div class="create-container">
            <h2>게시글 수정</h2>
            
            <form id="editForm">
                <div class="form-group">
                    <label for="title">제목</label>
                    <input type="text" id="title" name="title" required>
                </div>

                <div class="form-group">
                    <label for="professor">교수명</label>
                    <input type="text" id="professor" name="professor" required>
                </div>

                <div class="form-group">
                    <label for="content">명언 내용</label>
                    <textarea id="content" name="content" rows="10" required></textarea>
                </div>

                <div class="form-actions">
                    <button type="button" class="btn-secondary" onclick="history.back()">취소</button>
                    <button type="submit" class="btn-primary">수정하기</button>
                </div>
            </form>
        </div>
    </main>

    <script>
        const postId = window.location.pathname.split('/')[2];

        // 기존 게시글 정보 로드
        async function loadPostData() {
            try {
                const response = await fetch(`/api/posts/${postId}`);
                const post = await response.json();
                
                document.getElementById('title').value = post.title;
                document.getElementById('professor').value = post.professor;
                document.getElementById('content').value = post.content;
            } catch (error) {
                console.error('게시글 로드 실패:', error);
                alert('게시글을 불러올 수 없습니다.');
                history.back();
            }
        }

        // 게시글 수정 폼 제출
        document.getElementById('editForm').addEventListener('submit', async function(e) {
            e.preventDefault();

            const formData = {
                title: document.getElementById('title').value,
                professor: document.getElementById('professor').value,
                content: document.getElementById('content').value
            };

            try {
                const response = await fetch(`/api/posts/${postId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(formData)
                });

                if (response.ok) {
                    alert('게시글이 수정되었습니다.');
                    window.location.href = `/posts/${postId}`;
                } else if (response.status === 403) {
                    alert('수정 권한이 없습니다.');
                } else {
                    alert('수정에 실패했습니다.');
                }
            } catch (error) {
                console.error('수정 실패:', error);
                alert('수정에 실패했습니다.');
            }
        });

        // 페이지 로드 시 게시글 데이터 로드
        document.addEventListener('DOMContentLoaded', loadPostData);
    </script>
</body>
</html>
